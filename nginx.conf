server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Increase timeouts for ESI API calls
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    location / {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 keep-alive to upstream. Connection "" clears the hop-by-hop
        # header, which is correct for plain HTTP proxying. WebSocket upgrades
        # are NOT currently supported. If WebSocket is added, implement a map
        # directive in the http{} context of the host nginx.conf and switch to
        # proxy_set_header Connection $connection_upgrade; here.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        proxy_pass http://localhost:5000;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
