version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      # Set TIMER_PASSWORD in .env — if unset, timer writes are disabled (a
      # random per-process token is used). Never hardcode a default here.
      - TIMER_PASSWORD=${TIMER_PASSWORD:-}
      - DEPLOYMENT=${DEPLOYMENT:-lawn_perrigen}
      # EVE SSO (optional). When all three EVE_* are set, "Log in with EVE"
      # replaces the password as the primary auth. Set a persistent
      # FLASK_SECRET_KEY or sessions reset on every restart.
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-}
      - EVE_CLIENT_ID=${EVE_CLIENT_ID:-}
      - EVE_CLIENT_SECRET=${EVE_CLIENT_SECRET:-}
      - EVE_CALLBACK_URL=${EVE_CALLBACK_URL:-}
      - AUTH_ALLOWED_ALLIANCE_IDS=${AUTH_ALLOWED_ALLIANCE_IDS:-}
      - AUTH_ALLOWED_CHARACTER_IDS=${AUTH_ALLOWED_CHARACTER_IDS:-}
    volumes:
      # Persist SQLite database outside the container
      - ./intel.db:/app/intel.db
    healthcheck:
      # python urllib, not curl — curl isn't installed in python:3.11-slim
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/status', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
