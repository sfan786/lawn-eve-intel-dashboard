version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - TIMER_PASSWORD=${TIMER_PASSWORD:-lawnmower}
      - DEPLOYMENT=${DEPLOYMENT:-lawn_perrigen}
    volumes:
      # Persist SQLite database outside the container
      - ./intel.db:/app/intel.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
